# SimpleCNN – hyperparameters
# Run: python -m src.models.simple_cnn.train  (from project root)
#
# Grid search findings (simplecnn.ipynb) — both tested at lr=0.1:
#   Adam lr=0.1 → test_acc=0.0959  (LR too high, failed to learn)
#   SGD  lr=0.1 → NaN loss         (diverged immediately)
#
# Neither lr=0.1 combination worked. Adam lr=0.001 is recommended
# as a safe starting point for training SimpleCNN from scratch.

model:
  dropout: 0.5

training:
  seed: 42
  batch_size: 32
  num_workers: 4
  weight_decay: 1.0e-4
  early_stop_patience: 7
  optimizer: Adam           # SGD | Adam | AdamW
  lr: 1.0e-3                # lr=0.1 failed in notebook; 0.001 recommended
  epochs: 15

  save_dir: checkpoints/simple_cnn
