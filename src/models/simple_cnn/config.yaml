# SimpleCNN Training Configuration
# Basic CNN model for quick training and baseline comparison

model:
  model_name: simple_cnn
  num_classes: 26
  input_size: 224
  pretrained: false
  freeze_backbone: false
  dropout_rate: 0.4

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00005
  momentum: 0.9
  optimizer: adam
  scheduler: step
  scheduler_step_size: 10
  scheduler_gamma: 0.5
  early_stopping_patience: 10
  early_stopping_metric: val_loss

data:
  data_path: ../../../PlantVillage-Dataset/raw/segmented
  train_path: ../../../PlantVillage-Dataset/raw/segmented/train
  val_path: ../../../PlantVillage-Dataset/raw/segmented/val
  test_path: ../../../PlantVillage-Dataset/raw/segmented/test
  num_workers: 2
  pin_memory: true
  shuffle: true
  augmentation: true
  augmentation_strength: 0.3
  validation_split: 0.2
  random_seed: 42

device:
  device: cuda
  multi_gpu: false
  gpu_ids: [0]
  mixed_precision: false

checkpoint:
  checkpoint_dir: ./checkpoints/simple_cnn
  save_frequency: 5
  save_best_only: true
  best_model_metric: val_accuracy
  log_dir: ./logs/simple_cnn
  log_frequency: 50
