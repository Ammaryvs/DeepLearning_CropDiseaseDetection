# MobileNetV2 transfer learning – hyperparameters
# Run: python -m src.models.mobilenetv2.train  (from project root)
#
# Notebook results (MobileNet.ipynb):
#   LR=0.0001, Dropout=0.1, Adam, StepLR(step_size=7, gamma=0.1), 18 epochs
#   → Epoch 1: Train acc 90.03%  |  Val acc 98.53%
#   (training was interrupted after epoch 2)

model:
  pretrained: true
  dropout: 0.1

training:
  seed: 42
  batch_size: 32
  num_workers: 4
  weight_decay: 1.0e-4
  early_stop_patience: 7
  optimizer: Adam           # Adam | SGD | AdamW
  lr: 1.0e-4
  epochs: 18

  # StepLR scheduler — matches notebook exactly
  scheduler:
    step_size: 7
    gamma: 0.1

  save_dir: checkpoints/mobilenetv2
