# Example Configuration for Model Training
# Copy this file to your model directory and customize as needed

model:
  model_name: resnet50
  num_classes: 26
  input_size: 224
  pretrained: true
  freeze_backbone: false
  dropout_rate: 0.3

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  momentum: 0.9
  optimizer: adam          # Options: adam, sgd, adamw
  scheduler: cosine        # Options: cosine, step, exponential, linear
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  early_stopping_patience: 15
  early_stopping_metric: val_loss

data:
  data_path: ./data
  train_path: ./data/train
  val_path: ./data/val
  test_path: ./data/test
  num_workers: 4
  pin_memory: true
  shuffle: true
  augmentation: true
  augmentation_strength: 0.5
  validation_split: 0.2
  random_seed: 42

device:
  device: cuda             # Options: cuda, cpu, mps
  multi_gpu: false
  gpu_ids: [0]
  mixed_precision: false

checkpoint:
  checkpoint_dir: ./checkpoints
  save_frequency: 5
  save_best_only: true
  best_model_metric: val_accuracy
  log_dir: ./logs
  log_frequency: 10
