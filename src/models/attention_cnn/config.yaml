# AttentionCNN Training Configuration
# CNN with attention mechanisms for focused feature learning

model:
  model_name: attention_cnn
  num_classes: 38
  input_size: 224
  pretrained: false
  freeze_backbone: false
  dropout_rate: 0.3

training:
  epochs: 90
  batch_size: 32
  learning_rate: 0.001          # Test: 0.1, 0.01, 0.001
  weight_decay: 0.0001
  momentum: 0.9
  optimizer: adamw
  scheduler: cosine
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  early_stopping_patience: 15
  early_stopping_metric: val_accuracy

data:
  data_path: ../PlantVillage-Dataset/raw/color
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true
  shuffle: true
  augmentation: true
  augmentation_strength: 0.5    # Recommended extra sweep for AttentionCNN: 0.3, 0.5, 0.7
  random_seed: 42

device:
  device: cuda
  multi_gpu: false
  gpu_ids: [0]
  mixed_precision: true

checkpoint:
  checkpoint_dir: ./checkpoints/attention_cnn
  save_frequency: 5
  save_best_only: true
  best_model_metric: val_accuracy
  log_dir: ./logs/attention_cnn
  log_frequency: 50
