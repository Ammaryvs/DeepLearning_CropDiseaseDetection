# Vision Transformer Training Configuration
# Lower learning rate and smaller batch size suitable for transformer models

model:
  model_name: vit
  num_classes: 38
  input_size: 224
  pretrained: true
  freeze_backbone: false
  dropout_rate: 0.1

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001          # Test: 0.1, 0.01, 0.001
  weight_decay: 0.01            # Recommended extra sweep for ViT: 0.01, 0.03, 0.05
  momentum: 0.9
  optimizer: adamw                # Recommended for ViT
  scheduler: cosine               # Cosine annealing works well with ViT
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  early_stopping_patience: 20
  early_stopping_metric: val_accuracy

data:
  data_path: ../PlantVillage-Dataset/raw/color
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true
  shuffle: true
  augmentation: true
  augmentation_strength: 0.5
  random_seed: 42

device:
  device: cuda                    # Use cuda if available
  multi_gpu: false
  gpu_ids: [0]
  mixed_precision: true           # Use AMP for faster training

checkpoint:
  checkpoint_dir: ./checkpoints/vit
  save_frequency: 5
  save_best_only: true
  best_model_metric: val_accuracy
  log_dir: ./logs/vit
  log_frequency: 50
